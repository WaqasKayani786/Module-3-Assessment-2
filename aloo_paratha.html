<!DOCTYPE html>
<html>
    <head>
        <title>Barakah Bites | Meals | Shawarma</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="fontAwesome/css/all.css">
    </head>

    <body class="body-item">

        <div class="header">
            <a href="index.html">
                <i class="fa-solid fa-house"></i>
            </a>
            <a href="meals.html">
                <i class="fa-solid fa-burger"></i>
            </a>
            <a href="drinks.html">
                <i class="fa-solid fa-glass-water"></i>
            </a>
            <a href="desserts.html">
                <i class="fa-solid fa-ice-cream"></i>
            </a>
            <a href="about.html">
                <i class="fa-solid fa-circle-info"></i>
            </a>
        </div>

        <div id="item">

           <div class="item-details">
                <img src="images/aloo_paratha.jpg">

                <h1>Aloo Paratha</h1>

                <div class="item-details-info">
                    <p><b>Price: </b>R49.99</p>
                </div>

                <div class="item-details-description">
                    <p>Soft, golden flatbread stuffed with perfectly seasoned potatoes and cooked until crispy and flavorful</p>
                </div>

                <div class="item-details-extras">
                    <h2>Extras</h2>
                    <br>
                    <input id="check-01" type="checkbox">
                    <label for="check-01">Butter</label>
                    <br>
                    <input id="check-02" type="checkbox">
                    <label for="check-02">Yogurt</label>
                    <br>
                    <input id="check-03" type="checkbox">
                    <label for="check-03">Pickles</label>
                    <br>
                    <input id="check-04" type="checkbox">
                    <label for="check-04">Soft Drink</label>
                </div>

                <div class="item-details-notes">
                    <h2>Notes</h2>
                    <input type="text" placeholder="Notes">
                </div>

                <div class="item-details-order">
                    <a href="order.html" class="recipe-details-order-button">
                        <p>Place Order<i class="fa-solid fa-basket-shopping"></i></p>
                    </a>
                </div>
            </div>
        </div>
    </body>
</html>
